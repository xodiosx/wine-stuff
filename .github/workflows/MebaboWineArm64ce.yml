name: Build zWine ARM64EC (Termux Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
# ------------------------------------------------------------
# 1. Clone Wine (ARM64EC repo)
# ------------------------------------------------------------
      - name: 📥 Clone Wine ARM64EC
        run: |
          git clone -b bleeding-edge https://github.com/ziad9267/wine.git wine
          cd wine
          git submodule update --init --recursive

# ------------------------------------------------------------
# 2. Install deps (host tools)
# ------------------------------------------------------------
      - name: 📦 Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential git wget xz-utils \
            flex bison pkg-config gettext \
            libx11-dev:i386 libfreetype6-dev:i386 \
            libxcursor-dev:i386 libxi-dev:i386 \
            libxrandr-dev:i386 libxinerama-dev:i386 \
            libxxf86vm-dev:i386 libgl1-mesa-dev:i386 \
            libosmesa6-dev:i386 libpulse-dev:i386 \
            libdbus-1-dev:i386 libfontconfig1-dev:i386

# ------------------------------------------------------------
# 3. Setup Termux sysroot
# ------------------------------------------------------------
      - name: 📱 Setup Termux sysroot
        run: |
          mkdir -p imagefs
          cd imagefs
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          rm termuxfs.tar
          sudo mv ./data /
          sudo chown -R $(whoami):$(whoami) /data

# ------------------------------------------------------------
# 4. Install LLVM MinGW (for PE)
# ------------------------------------------------------------
      - name: 🧰 Install LLVM MinGW
        run: |
          wget -q https://github.com/mstorsjo/llvm-mingw/releases/download/20250305/llvm-mingw-20250305-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xf llvm-mingw-*.tar.xz
          sudo mv llvm-mingw-* /opt/llvm-mingw

# ------------------------------------------------------------
# 5. Setup Android NDK
# ------------------------------------------------------------
      - name: 🤖 Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

# ------------------------------------------------------------
# 6. Build Wine TOOLS (CRITICAL FIX)
# ------------------------------------------------------------
      - name: 🔧 Build Wine tools
        run: |
          cd wine
          ./autogen.sh

          mkdir tools-build
          mkdir wine-tools

          cd tools-build
          ../configure \
            --without-x \
            --without-wayland \
            --without-vulkan \
            --without-gstreamer

          make -j$(nproc) __tooldeps__ nls/all

          cp -r ./* ../wine-tools

# ------------------------------------------------------------
# 7. Build Wine (Android target)
# ------------------------------------------------------------
      - name: 🔨 Build Wine ARM64EC
        run: |
          export TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="/opt/llvm-mingw/bin:$PATH"

          export TARGET=aarch64-linux-android
          export API=28
          export CC="$TOOLCHAIN/clang --target=$TARGET$API"
          export CXX="$TOOLCHAIN/clang++ --target=$TARGET$API"
          export AS="$CC"

          export PREFIX_DIR="/data/data/com.termux/files/usr"

          export PKG_CONFIG_LIBDIR=$PREFIX_DIR/lib/pkgconfig:$PREFIX_DIR/share/pkgconfig
          export CPPFLAGS="-I$PREFIX_DIR/include"
          export CFLAGS="-I$PREFIX_DIR/include -Wno-implicit-function-declaration"
          export LDFLAGS="-L$PREFIX_DIR/lib"
          export LIBRARY_PATH="$PREFIX_DIR/lib"

          cd wine

          mkdir build && cd build

          ../configure \
            --host=$TARGET \
            --prefix=/usr \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --enable-archs=arm64ec \
            --enable-win64 \
            --disable-tests \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-oss \
            --without-pcap \
            --without-sane \
            --without-udev \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)

# ------------------------------------------------------------
# 8. Fix Android linker issues (important)
# ------------------------------------------------------------
      - name: 🔁 Rebuild with android-shmem
        run: |
          export LDFLAGS="-L/data/data/com.termux/files/usr/lib -landroid-shmem -landroid-spawn"

          cd wine/build
          make -j$(nproc)

# ------------------------------------------------------------
# 9. Package
# ------------------------------------------------------------
      - name: 📦 Package Wine
        run: |
          cd wine/build
          make install DESTDIR=/tmp/wine-install

          cd /tmp/wine-install
          tar -czf $GITHUB_WORKSPACE/wine-arm64ec-termux.tar.gz .

# ------------------------------------------------------------
# 10. Upload
# ------------------------------------------------------------
      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec-termux
          path: wine-arm64ec-termux.tar.gz
