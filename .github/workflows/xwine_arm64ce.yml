name: Build Wine ARM64EC (Native ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: 📦 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget xz-utils ccache \
            flex bison pkg-config gettext \
            mingw-w64 \
            libx11-dev libfreetype6-dev libxcursor-dev \
            libxi-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libgl1-mesa-dev libosmesa6-dev \
            libpulse-dev libdbus-1-dev libfontconfig1-dev \
            libxcomposite-dev libxrender-dev libxext-dev \
            libudev-dev libvulkan-dev

      # =========================
      # CACHE LLVM
      # =========================
      - name: 💾 Cache llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-arm64-v1

      - name: ⚙️ Install LLVM MinGW
        run: |
          if [ ! -d /opt/llvm-mingw ]; then
            sudo mkdir -p /opt
            cd /opt

            wget -q -O llvm.tar.xz https://github.com/mstorsjo/llvm-mingw/releases/download/20250305/llvm-mingw-20250305-ucrt-ubuntu-20.04-aarch64.tar.xz

            mkdir tmp
            tar -xf llvm.tar.xz -C tmp
            sudo mv tmp/* /opt/llvm-mingw

            rm -rf tmp llvm.tar.xz
          fi

          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      # =========================
      # CACHE WINE SOURCE
      # =========================
      - name: 💾 Cache Wine source
        uses: actions/cache@v4
        with:
          path: wine
          key: wine-src-v1

      - name: 📥 Clone Wine
        run: |
          if [ ! -d wine ]; then
            git clone https://gitlab.winehq.org/wine/wine.git
            cd wine
            git submodule update --init --recursive
          fi

      # =========================
      # PATCH SYSTEM (UNCHANGED)
      # =========================
      - name: 🧪 Apply patches
        run: |
          cd wine

          echo "🧪 Applying patches..."

          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec sed -i "s|/tmp/|/data/data/com.termux/files/usr/tmp/|g" {} + || true

          FILE="dlls/atiadlxx/atiadlxx_main.c"
          [ -f "$FILE" ] && sed -i "s/LONG dummy/long dummy/g" "$FILE"

          FILE="dlls/wdscore/wdscore.spec"
          [ -f "$FILE" ] && sed -i "/CDynamicArray/d" "$FILE"

          FILE="dlls/ntdll/unix/virtual.c"
          [ -f "$FILE" ] && sed -i "s/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g"

          echo "✔ Patch complete"

      # =========================
      # CACHE BUILD
      # =========================
      - name: 💾 Cache build
        uses: actions/cache@v4
        with:
          path: wine/build
          key: wine-build-v1

      # =========================
      # BUILD (FAST)
      # =========================
      - name: 🔨 Build Wine
        run: |
          export CC="ccache clang"
          export CXX="ccache clang++"

          cd wine
          mkdir -p build && cd build

          ../configure --enable-win64 --disable-tests

          make -j$(nproc)

      # =========================
      # PACKAGE
      # =========================
      - name: 📦 Package
        run: |
          cd wine/build
          tar -czf ../../wine-arm64.tar.gz .

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64-native
          path: wine-arm64.tar.gz
