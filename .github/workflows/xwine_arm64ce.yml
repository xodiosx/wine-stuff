name: Build Wine ARM64EC (Termux Patched)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      TMP_FIX: /data/data/com.termux/files/usr/tmp

    steps:
      - name: 📥 Install dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y \
            git build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            mingw-w64 clang llvm flex bison \
            libx11-dev libfreetype6-dev libxcursor-dev \
            libxi-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libgl1-mesa-dev libosmesa6-dev \
            libpulse-dev libdbus-1-dev libfontconfig1-dev \
            libxcomposite-dev libxrender-dev libxext-dev \
            libudev-dev libvulkan-dev wget

      - name: 📦 Clone Wine source
        run: |
          git clone https://github.com/wine-mirror/wine.git
          cd wine
          git submodule update --init --recursive

      - name: 🧪 Apply Termux + ARM64EC patches
        run: |
          cd wine

          echo "🔧 Fixing /tmp paths..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i "s|/tmp/|$TMP_FIX/|g" || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i "s|\"/tmp\"|\"$TMP_FIX\"|g" {} + || true
          find . -name "file.c" -exec sed -i "s|\"/tmp\"|\"$TMP_FIX\"|g" {} + || true
          find . -name "loader.c" -exec sed -i "s|\"/tmp\"|\"$TMP_FIX\"|g" {} + || true
          find . -name "server.c" -exec sed -i "s|\"/tmp\"|\"$TMP_FIX\"|g" {} + || true
          echo "✔ TMP path fixed"

          # Interlocked fix
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            sed -i 's/LONG dummy/long dummy/g' "$FILE"
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
          fi

          # wdscore cleanup
          sed -i '/CDynamicArray/d' dlls/wdscore/wdscore.spec || true

          # virtual.c fix
          sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' dlls/ntdll/unix/virtual.c || true

          # loader mappings
          sed -i 's|/x86_64-windows|/aarch64-windows|g' dlls/ntdll/unix/loader.c || true

          sed -i 's|xtajit64\.dll|libarm64ecfex.dll|g' dlls/ntdll/loader.c || true
          sed -i 's/ULONG buffer\[16\];/ULONG buffer\[32\];/g' dlls/ntdll/loader.c || true

          sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' loader/wine.inf.in || true
          sed -i 's/xtajit\.dll/libwow64fex.dll/g' loader/wine.inf.in || true

          # FEX flags
          sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE (CONTEXT_ARM64 | 0x00000020)' include/winnt.h || true
          sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE (CONTEXT_ARM64 | 0x00000040)' include/winnt.h || true

          # Vulkan VRAM spoof
          sed -i '/memory_properties);/a \
          { \
              const char *v = getenv("WINE_VRAM_SIZE"); \
              uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
              uint32_t k; \
              for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                  if (object->memory_properties.memoryHeaps[k].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                      object->memory_properties.memoryHeaps[k].size = s; \
          }' dlls/winevulkan/vulkan.c || true

          echo "✔ Internal patches applied"

          # External patches
          PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"
          for FILE in 1.patch 2.patch; do
            wget -q -O "$FILE" "$PATCH_BASE/$FILE"
            if git apply --check "$FILE"; then
              git apply --whitespace=fix "$FILE"
            else
              git apply --3way --whitespace=fix "$FILE" || true
            fi
          done

          echo "✔ External patches applied"

      - name: ⚙️ Configure build
        run: |
          cd wine
          mkdir build && cd build

          CC=aarch64-linux-gnu-gcc \
          CXX=aarch64-linux-gnu-g++ \
          ../configure \
            --host=aarch64-linux-gnu \
            --enable-win64

      - name: 🔨 Build Wine
        run: |
          cd wine/build
          make -j$(nproc)

      - name: 📦 Package build
        run: |
          cd wine/build
          tar -czf wine-arm64ec.tar.gz *

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine/build/wine-arm64ec.tar.gz
