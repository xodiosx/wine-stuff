name: Wine ARM64ce zxm (Termux + Proton Patches + VRAM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Clone Wine (from ziad9267, includes Proton patches)
        run: |
          git clone https://github.com/ziad9267/wine.git
          cd wine

      - name: Install dependencies (with multilib for 32-bit host tools)
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget curl xz-utils flex bison pkg-config \
            gettext icoutils fontforge-nox \
            libx11-dev libxext-dev libxrandr-dev libxrender-dev \
            libxcursor-dev libxi-dev libxfixes-dev libxcomposite-dev \
            libxdamage-dev libxinerama-dev libxxf86vm-dev \
            libgl1-mesa-dev libvulkan-dev libwayland-dev \
            libpulse-dev libdbus-1-dev \
            libfontconfig-dev libfreetype-dev libgnutls28-dev \
            libasound2-dev libudev-dev \
            llvm clang lld \
            gcc-multilib g++-multilib

      # =========================
      # LLVM MinGW (dynamic latest)
      # =========================
      - name: Cache LLVM MinGW
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-latest-${{ runner.os }}

      - name: Install LLVM MinGW (if not cached)
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          cd /opt
          LATEST_TAG=$(curl -s https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest | grep -Po '"tag_name": "\K[^"]*')
          ASSET_NAME="llvm-mingw-${LATEST_TAG}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          DOWNLOAD_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LATEST_TAG}/${ASSET_NAME}"
          echo "Downloading $DOWNLOAD_URL"
          sudo wget --quiet "$DOWNLOAD_URL" -O llvm-mingw.tar.xz
          sudo tar -xf llvm-mingw.tar.xz
          EXTRACTED_DIR=$(tar tf llvm-mingw.tar.xz | head -1 | cut -f1 -d"/")
          sudo mv "$EXTRACTED_DIR" llvm-mingw
          sudo rm llvm-mingw.tar.xz

      - name: Export PATH (LLVM MinGW)
        run: echo "PATH=/opt/llvm-mingw/bin:$PATH" >> $GITHUB_ENV

      # =========================
      # Android NDK
      # =========================
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # Termux sysroot (from ziad9267's tarball)
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir -p termux && cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          ls -la /data/data/com.termux/files/usr/

      # =========================
      # ADVANCED PATCHING STAGE (FEX, VRAM, etc.)
      # =========================
      - name: Apply comprehensive patches (FEX + VRAM for Vulkan/DirectX/VKD3D)
        run: |
          cd wine

          echo "== 1. Fixing /tmp paths for Termux =="
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec grep -l "/tmp" {} \; 2>/dev/null | \
            xargs -r sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'

          find server -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true

          echo "== 2. InterlockedOr casting (atiadlxx) =="
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            sed -i 's/LONG dummy/long dummy/g' "$FILE"
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)&dummy, 0)|g' "$FILE"
          fi

          echo "== 3. Clean wdscore.spec stubs =="
          FILE="dlls/wdscore/wdscore.spec"
          [ -f "$FILE" ] && sed -i '/CDynamicArray/d' "$FILE"

          echo "== 4. ntdll virtual.c uninitialized vars =="
          FILE="dlls/ntdll/unix/virtual.c"
          [ -f "$FILE" ] && sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"

          echo "== 5. PE directory mapping (aarch64) =="
          FILE="dlls/ntdll/unix/loader.c"
          [ -f "$FILE" ] && sed -i 's|/x86_64-windows|/aarch64-windows|g' "$FILE"

          echo "== 6. ntdll loader buffer size =="
          FILE="dlls/ntdll/loader.c"
          [ -f "$FILE" ] && sed -i 's/ULONG buffer\[16\];/ULONG buffer[32];/g' "$FILE"

          echo "== 7. wine.inf: xtajit64 -> libarm64ecfex =="
          INF="loader/wine.inf.in"
          [ -f "$INF" ] && sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"

          echo "== 8. FEX YMM state support (unwind.h) - fixed escaping =="
          FILE="dlls/ntdll/unwind.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            # Properly escape & inside sed
            sed -i '/ctx_flags_x64_to_arm/,/}/ {
              /CONTEXT_AMD64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_AMD64_XSTATE) ret |= CONTEXT_ARM64_FEX_YMMSTATE;/
            }' "$FILE"
            sed -i '/ctx_flags_arm_to_x64/,/}/ {
              /CONTEXT_ARM64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_ARM64_FEX_YMMSTATE) ret |= CONTEXT_AMD64_XSTATE;/
            }' "$FILE"
          fi

          echo "== 9. winnt.h: add FEX YMMSTATE flag =="
          FILE="include/winnt.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            sed -i '/^#define CONTEXT_ARM64_X18/ s/.*/#define CONTEXT_ARM64_X18             (CONTEXT_ARM64 | 0x00000010)/' "$FILE"
            if ! grep -q 'CONTEXT_ARM64_XSTATE' "$FILE"; then
              sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE          (CONTEXT_ARM64 | 0x00000020)' "$FILE"
            fi
            sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE   (CONTEXT_ARM64 | 0x00000040)' "$FILE"
          fi

          echo "== 10. VRAM faking: Vulkan =="
          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                  uint32_t k; \
                  for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                      if (object->memory_properties.memoryHeaps[k].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                          object->memory_properties.memoryHeaps[k].size = s; \
              }' "$FILE"
          fi

          echo "== 11. VRAM faking: DirectX (wined3d) =="
          FILE="dlls/wined3d/adapter_gl.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/gl_info->vidmem = vidmem;/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  if (v) gl_info->vidmem = (uint64_t)atoll(v) * 1024 * 1024; \
              }' "$FILE"
          fi
          FILE="dlls/wined3d/adapter_vk.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/device->adapter.vidmem = vidmem;/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  if (v) device->adapter.vidmem = (uint64_t)atoll(v) * 1024 * 1024; \
              }' "$FILE"
          fi

          echo "== 12. VRAM faking: VKD3D =="
          FILE="dlls/vkd3d/libs/vkd3d/device.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/vkGetPhysicalDeviceMemoryProperties(physical_device, \&memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  if (v) { \
                      uint64_t s = (uint64_t)atoll(v) * 1024 * 1024; \
                      for (uint32_t i = 0; i < memory_properties.memoryHeapCount; ++i) \
                          if (memory_properties.memoryHeaps[i].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                              memory_properties.memoryHeaps[i].size = s; \
                  } \
              }' "$FILE"
          fi

          echo "== 13. Apply external patches (if any) =="
          PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"
          for p in 1.patch 2.patch; do
            wget -q "$PATCH_BASE/$p" -O "$p" || continue
            if git apply --check "$p"; then
              git apply --whitespace=fix "$p"
            elif git apply --3way --check "$p"; then
              git apply --3way --whitespace=fix "$p"
            else
              git apply --reject --whitespace=fix "$p" || true
            fi
          done

          echo "== All patches applied successfully =="

      # =========================
      # BUILD
      # =========================
      - name: Build Wine tools (host, 32-bit)
        run: |
          cd wine
          ./configure --without-x --without-freetype
          make -j$(nproc) __tooldeps__

      - name: Configure Wine (ARM64 Android for Termux)
        run: |
          cd wine

          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="/opt/llvm-mingw/bin:$TOOLCHAIN:$PATH"

          export CC="$TOOLCHAIN/clang --target=aarch64-linux-android28"
          export CXX="$TOOLCHAIN/clang++ --target=aarch64-linux-android28"

          deps="/data/data/com.termux/files/usr"

          export PKG_CONFIG_PATH="$deps/lib/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export LDFLAGS="-L$deps/lib -landroid-shmem -landroid-spawn"

          mkdir -p build && cd build

          ../configure \
            --host=aarch64-linux-android \
            --with-mingw=clang \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-wayland \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-freetype \
            --enable-wineandroid_drv=no \
            --with-wine-tools=..

      - name: Build Wine
        run: |
          cd wine/build
          make -j$(nproc)

      - name: Install to staging directory
        run: |
          cd wine/build
          make install DESTDIR=wine-out

      - name: Package Wine for Termux
        run: |
          cd wine/build/wine-out
          tar -czf wine-termux-arm64-proton-vram.tar.gz *
          mv wine-termux-arm64-proton-vram.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-termux-arm64-proton-vram
          path: wine-termux-arm64-proton-vram.tar.gz

      # Optional: Create a GitHub Release
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-termux-${{ github.run_number }}-$(date +'%Y%m%d-%H%M%S')
          name: "Wine ARM64 for Termux (Proton + VRAM patches)"
          body: |
            Automated Wine build for Termux (Android).
            - Source: https://github.com/ziad9267/wine.git (Proton patches included)
            - Additional patches: FEX YMM state, VRAM faking for Vulkan/DirectX/VKD3D
            - Target: aarch64-linux-android28
            - Install path: `/data/data/com.termux/files/usr`
            - Set `WINE_VRAM_SIZE` (in MiB) to override VRAM (default 2048 MiB).
          files: |
            wine-termux-arm64-proton-vram.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
