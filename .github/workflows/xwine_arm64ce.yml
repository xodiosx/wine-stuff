name: Build & Deploy Engine

on:
 workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            targetos: linux
            targetarch: amd64

          - os: ubuntu-22.04
            targetos: linux
            targetarch: i386

          - os: ubuntu-22.04-arm
            targetos: linux
            targetarch: arm64

          - os: ubuntu-22.04-arm
            targetos: linux
            targetarch: armhf

          - os: ubuntu-24.04
            targetos: linux
            targetarch: riscv64
            cross: true

          - os: ubuntu-22.04
            targetos: linux
            targetarch: ppc64el
            cross: true

          - os: ubuntu-latest
            targetos: android
            targetarch: multiarch

          - os: ubuntu-latest
            targetos: nswitch
            targetarch: arm64

          - os: ubuntu-latest
            targetos: psvita
            targetarch: armv7hf

          - os: windows-latest
            targetos: win32
            targetarch: amd64

          - os: windows-2022
            targetos: win32
            targetarch: i386

          - os: macos-14
            targetos: apple
            targetarch: arm64

          - os: macos-latest
            targetos: ios
            targetarch: arm64

          - os: macos-15-intel
            targetos: apple
            targetarch: amd64

    env:
      SDL_VERSION: 2.32.10
      FFMPEG_VERSION: 8.1
      GH_CPU_ARCH: ${{ matrix.targetarch }}
      GH_CPU_OS: ${{ matrix.targetos }}
      GH_CROSSCOMPILING: ${{ matrix.cross }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------------------------
      # INSTALL DEPS
      # -------------------------
      - name: Install dependencies
        run: bash scripts/gha/deps_${{ matrix.targetos }}.sh

      # -------------------------
      # APPLY PATCHES (FIXED)
      # -------------------------
      - name: Apply Wine patches
        if: matrix.targetos == 'linux'
        run: |
          set -e

          cd wine || exit 1

          echo "🧪 Applying patches..."

          git submodule update --init --recursive

          MATCHES=$(find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec grep -l "/tmp" {} \; 2>/dev/null)

          if [ -n "$MATCHES" ]; then
            echo "$MATCHES" | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          else
            echo "✔ No /tmp matches found"
          fi

          find server -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true

          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true

          echo "✔ 路径修复完成"

          FILE="dlls/atiadlxx/atiadlxx_main.c"
          [ -f "$FILE" ] && sed -i 's/LONG dummy/long dummy/g' "$FILE"

          FILE="dlls/wdscore/wdscore.spec"
          [ -f "$FILE" ] && sed -i '/CDynamicArray/d' "$FILE"

          FILE="dlls/ntdll/unix/virtual.c"
          [ -f "$FILE" ] && sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"

          FILE="dlls/ntdll/unix/loader.c"
          [ -f "$FILE" ] && sed -i 's|/x86_64-windows|/aarch64-windows|g' "$FILE"

          FILE="dlls/ntdll/loader.c"
          [ -f "$FILE" ] && sed -i 's|xtajit64\.dll|libarm64ecfex.dll|g' "$FILE"

          INF="loader/wine.inf.in"
          [ -f "$INF" ] && sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"

          FILE="include/winnt.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE (CONTEXT_ARM64 | 0x00000020)' "$FILE"
            sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE (CONTEXT_ARM64 | 0x00000040)' "$FILE"
          fi

          PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"
          for P in 1.patch 2.patch; do
            wget -q -O "$P" "$PATCH_BASE/$P"

            if git apply --check "$P" > /dev/null 2>&1; then
              git apply --whitespace=fix "$P"
            elif git apply --3way --check "$P" > /dev/null 2>&1; then
              git apply --3way --whitespace=fix "$P"
            else
              git apply --reject --whitespace=fix "$P" || true
            fi
          done

          echo "✔ All patch processes completed"

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build engine
        env:
          FWGS_PFX_PASSWORD: ${{ secrets.FWGS_PFX_PASSWORD }}
        run: bash scripts/gha/build_${{ matrix.targetos }}.sh

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.targetos }}-${{ matrix.targetarch }}
          path: artifacts/*

  # -------------------------
  # RELEASE
  # -------------------------
  release:
    name: Upload releases
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/gha/make_release.sh "Xash3D FWGS" "${{ github.ref_name }}"
