name: Build zWine ARM64 (Termux/Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update

          sudo apt install -y \
            build-essential \
            git \
            wget \
            curl \
            xz-utils \
            flex \
            bison \
            pkg-config \
            python3 \
            python3-pip \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libpulse-dev \
            libdbus-1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgnutls28-dev \
            libasound2-dev \
            libudev-dev \
            llvm \
            clang \
            lld \
            mingw-w64

      - name: Install LLVM MinGW (ARM64 Windows toolchain)
        run: |
          cd /opt
          sudo wget https://github.com/mstorsjo/llvm-mingw/releases/latest/download/llvm-mingw-20240220-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm-mingw.tar.xz
          sudo tar -xf llvm-mingw.tar.xz
          sudo mv llvm-mingw-* llvm-mingw

      - name: Export toolchain
        run: |
          echo "PATH=/opt/llvm-mingw/bin:$PATH" >> $GITHUB_ENV

      - name: Clone Wine source
        run: |
          git clone https://gitlab.winehq.org/wine/wine.git
          cd wine

      - name: Apply patches (optional)
        run: |
          cd wine
          if [ -d "${{ github.workspace }}/patches" ]; then
            for p in ${{ github.workspace }}/patches/*.patch; do
              [ -f "$p" ] && patch -p1 < "$p"
            done
          fi

      - name: Configure Wine ARM64
        run: |
          cd wine
          mkdir build
          cd build

          ../configure \
            --host=aarch64-linux-gnu \
            --with-mingw \
            CC=clang \
            CXX=clang++ \
            LD=lld

      - name: Build Wine
        run: |
          cd wine/build
          make -j$(nproc)

      - name: Package build
        run: |
          cd wine/build
          tar -czf wine-arm64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64
          path: wine/build/wine-arm64.tar.gz
