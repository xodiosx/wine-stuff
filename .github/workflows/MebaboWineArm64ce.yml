name: Wine ARM64 (Termux Android Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Wine source
        run: |
          git clone https://gitlab.winehq.org/wine/wine.git
          cd wine

      - name: Install dependencies (FIXED)
        run: |
          sudo apt update

          # ❌ Removed ALL i386 (critical fix)
          sudo apt install -y \
            build-essential \
            git \
            wget \
            curl \
            xz-utils \
            flex \
            bison \
            pkg-config \
            gettext \
            icoutils \
            fontforge-nox \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libpulse-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libgnutls28-dev \
            libasound2-dev \
            libudev-dev \
            llvm \
            clang \
            lld

      - name: Install LLVM MinGW (ARM64 Windows toolchain)
        run: |
          cd /opt
          sudo wget https://github.com/mstorsjo/llvm-mingw/releases/latest/download/llvm-mingw-20240220-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm-mingw.tar.xz
          sudo tar -xf llvm-mingw.tar.xz
          sudo mv llvm-mingw-* llvm-mingw

      - name: Setup PATH
        run: |
          echo "PATH=/opt/llvm-mingw/bin:$PATH" >> $GITHUB_ENV

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      - name: Prepare Termux sysroot
        run: |
          mkdir termux
          cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data

      - name: Build Wine tools (FIXED PATH)
        run: |
          cd wine
          ./configure --without-x --without-wayland --without-vulkan

          make -j$(nproc) __tooldeps__ nls/all

          mkdir wine-tools
          cp -r tools wine-tools/

      - name: Configure Wine (FIXED)
        run: |
          cd wine

          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="/opt/llvm-mingw/bin:$PATH"

          export CC="$TOOLCHAIN/clang --target=aarch64-linux-android28"
          export CXX="$TOOLCHAIN/clang++ --target=aarch64-linux-android28"

          export deps="/data/data/com.termux/files/usr"

          export PKG_CONFIG_PATH=$deps/lib/pkgconfig:$deps/share/pkgconfig
          export CPPFLAGS="-I$deps/include"
          export LDFLAGS="-L$deps/lib -landroid-shmem -landroid-spawn"

          mkdir build
          cd build

          ../configure \
            --host=aarch64-linux-android \
            --with-mingw=clang \
            --enable-win64 \
            --disable-win16 \
            --disable-tests \
            --without-x \
            --without-wayland \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-krb5 \
            --without-oss \
            --without-pcap \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --enable-wineandroid_drv=no

      - name: Build Wine
        run: |
          cd wine/build
          make -j$(nproc)

      - name: Install to package
        run: |
          cd wine/build
          make install DESTDIR=wine-out

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64-termux
          path: wine/build/wine-out
