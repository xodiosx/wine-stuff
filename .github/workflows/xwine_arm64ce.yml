name: Build Wine ARM64EC (Native ARM64 + Full Patches)

on:
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine source branch'
        required: false
        default: 'wine'
        type: choice
        options:
          - wine
          - staging
          - proton
          - arm64ec
      wine_version:
        description: 'Wine version (e.g., wine-9.22, latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20250305
  LLVMMINGW_NAME: llvm-mingw-20250305-ucrt-ubuntu-20.04-aarch64
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 180

    steps:
      - name: 📦 Install native build dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential git wget xz-utils ccache \
            autoconf automake libtool \
            flex bison pkg-config gettext \
            mingw-w64 \
            libx11-dev libfreetype6-dev libxcursor-dev \
            libxi-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libgl1-mesa-dev libosmesa6-dev \
            libpulse-dev libdbus-1-dev libfontconfig1-dev \
            libxcomposite-dev libxrender-dev libxext-dev \
            libudev-dev libvulkan-dev \
            libwayland-dev libxkbcommon-dev libegl1-mesa-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libunwind-dev libgnutls28-dev libkrb5-dev \
            ocl-icd-opencl-dev

      - name: 💾 Setup ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: ⚙️ Configure ccache
        run: |
          ccache --set-config=cache_dir=${{ env.CCACHE_DIR }}
          ccache --set-config=max_size=${{ env.CCACHE_MAXSIZE }}
          ccache -z

      # ------------------------------------------------------------
      # LLVM MinGW Toolchain (cached)
      # ------------------------------------------------------------
      - name: 💾 Cache llvm-mingw
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-${{ env.LLVMMINGW_NAME }}

      - name: ⬇️ Install LLVM MinGW
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo wget -q https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          sudo mkdir -p llvm-extract
          sudo tar -xf ${{ env.LLVMMINGW_NAME }}.tar.xz -C llvm-extract
          EXTRACTED_DIR=$(sudo find llvm-extract -maxdepth 1 -type d | tail -n 1)
          sudo mv "$EXTRACTED_DIR" /opt/llvm-mingw
          sudo rm -rf llvm-extract ${{ env.LLVMMINGW_NAME }}.tar.xz

      - name: 🔧 Add llvm-mingw to PATH
        run: echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # Clone Wine Source
      # ------------------------------------------------------------
      - name: 📥 Clone Wine source
        run: |
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'wine' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          case "$WINE_BRANCH" in
            arm64ec)
              git clone -b bleeding-edge https://github.com/ziad9267/wine.git wine
              ;;
            staging)
              git clone https://github.com/wine-mirror/wine.git wine
              cd wine
              git fetch --tags
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "wine-$WINE_VERSION"
              fi
              cd ..
              ;;
            proton)
              git clone -b proton_10.0 https://github.com/ValveSoftware/wine.git wine
              ;;
            *)
              git clone https://gitlab.winehq.org/wine/wine.git wine
              cd wine
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "wine-$WINE_VERSION"
              fi
              cd ..
              ;;
          esac
          cd wine
          git submodule update --init --recursive
          echo "Wine source cloned to $(pwd)"

      # ------------------------------------------------------------
      # Apply Exact Patches from Provided Script + GStreamer fix
      # ------------------------------------------------------------
      - name: 🧪 Apply full patch set
        run: |
          cd wine

          # Termux tmp path fix
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          echo "路径修复完成"

          # 1. InterlockedOr 타입 캐스팅 수정 (atiadlxx)
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            if grep -q 'InterlockedOr(&dummy, 0)' "$FILE"; then
              sed -i 's/LONG dummy/long dummy/g' "$FILE"
              sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
              echo "✔ InterlockedOr patched with explicit casting"
            else
              echo "✔ InterlockedOr already patched or not found"
            fi
          fi

          FILE3="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE3" ]; then
            if grep -q '@ stub' "$FILE3"; then
              echo "Cleaning wdscore.spec stubs..."
              sed -i '/CDynamicArray/d' "$FILE3"
              echo "✔ wdscore stubs cleaned"
            else
              echo "✔ wdscore already cleaned or not found"
            fi
          fi

          # 2. ntdll virtual.c 미초기화 변수 방어
          FILE="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE" ]; then
            if grep -q 'unsigned int vprot, sec_flags;' "$FILE"; then
              echo "Fixing uninitialized vprot in virtual.c..."
              sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"
            fi
          fi

          FILE="dlls/ntdll/unix/loader.c"
          if ! grep -q '/aarch64-windows' "$FILE"; then
            echo "Patching PE directory mapping..."
            sed -i 's|/x86_64-windows|/aarch64-windows|g' "$FILE"
          fi

          FILE="dlls/ntdll/loader.c"
          if [ -f "$FILE" ]; then
            if grep -q 'xtajit64\.dll' "$FILE"; then
              echo "Replacing xtajit64.dll with libarm64ecfex.dll..."
              sed -i 's|xtajit64\.dll|libarm64ecfex.dll|g' "$FILE"
            fi
            if grep -q 'ULONG buffer\[16\];' "$FILE"; then
              echo "Increasing loader buffer size from 16 to 32..."
              sed -i 's/ULONG buffer\[16\];/ULONG buffer\[32\];/g' "$FILE"
            fi
          fi

          INF="loader/wine.inf.in"
          if ! grep -q 'libarm64ecfex.dll' "$INF"; then
            echo "Patching wine.inf..."
            sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"
            sed -i 's/xtajit\.dll/libwow64fex.dll/g' "$INF"
          fi

          # 5. FEX YMM State 대응 (unwind.h)
          FILE="dlls/ntdll/unwind.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            echo "Patching unwind flags for FEX YMM state..."
            sed -i '/ctx_flags_x64_to_arm/,/}/ {
              /CONTEXT_AMD64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_AMD64_XSTATE) ret |= CONTEXT_ARM64_FEX_YMMSTATE;/
            }' "$FILE"
            sed -i '/ctx_flags_arm_to_x64/,/}/ {
              /CONTEXT_ARM64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_ARM64_FEX_YMMSTATE) ret |= CONTEXT_AMD64_XSTATE;/
            }' "$FILE"
          fi

          # 6. winnt.h FEX 플래그 정의 추가
          FILE="include/winnt.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            echo "Patching winnt.h to match FEX diff..."
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
            sed -i 's/^#define CONTEXT_ARM64_X18.*/#define CONTEXT_ARM64_X18             (CONTEXT_ARM64 | 0x00000010)/' "$FILE"
            if ! grep -q 'CONTEXT_ARM64_XSTATE' "$FILE"; then
              sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE          (CONTEXT_ARM64 | 0x00000020)' "$FILE"
            fi
            sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE   (CONTEXT_ARM64 | 0x00000040)' "$FILE"
          fi

          # 8. Vulkan VRAM Faking 적용
          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE" ; then
            echo "Applying VRAM faking to winevulkan..."
            sed -i '/p_vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                  uint32_t k; \
                  for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                      if (object->memory_properties.memoryHeaps[k].flags \& VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                          object->memory_properties.memoryHeaps[k].size = s; \
              }' "$FILE"
          fi

          # 9. **NEW** GStreamer compatibility fix for Ubuntu 22.04 (GStreamer 1.20)
          FILE="dlls/winegstreamer/media-converter/videoconv.c"
          if [ -f "$FILE" ]; then
            echo "Fixing GstBufferMapInfo -> GstMapInfo for GStreamer 1.20 compatibility..."
            sed -i 's/GstBufferMapInfo/GstMapInfo/g' "$FILE"
            echo "✔ videoconv.c patched"
          fi

          # External patches from URL
          export PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"
          PATCH_FILES="1.patch 2.patch"
          echo "Applying external patches from $PATCH_BASE..."
          for FILE in $PATCH_FILES; do
            URL="${PATCH_BASE}/${FILE}"
            PATCH_FILE="$FILE"
            echo "--------------------------------------------"
            echo "Downloading $PATCH_FILE..."
            wget -q -O "$PATCH_FILE" "$URL"

            if git apply --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "✔ $PATCH_FILE can be applied cleanly"
                git apply --whitespace=fix "$PATCH_FILE"
            elif git apply --3way --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "⚠ Applying $PATCH_FILE with 3-way merge"
                git apply --3way --whitespace=fix "$PATCH_FILE"
            else
                echo "❌ $PATCH_FILE failed, generating rejects"
                git apply --reject --whitespace=fix "$PATCH_FILE" || true
                find . -name "*.rej"
            fi
          done
          echo "--------------------------------------------"
          echo "✔ All patch processes completed"

      # ------------------------------------------------------------
      # Generate configure script
      # ------------------------------------------------------------
      - name: 🔧 Generate configure script
        run: |
          cd wine
          if [ ! -f "configure" ]; then
            echo "Running autogen.sh to generate configure..."
            ./autogen.sh
          else
            echo "configure already exists."
          fi

      # ------------------------------------------------------------
      # Configure and Build
      # ------------------------------------------------------------
      - name: 🔨 Build Wine
        run: |
          export PATH="/opt/llvm-mingw/bin:$PATH"
          export CC="ccache clang"
          export CXX="ccache clang++"

          cd wine
          mkdir -p build && cd build

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64,arm64ec \
            --with-mingw=clang \
            --disable-tests \
            --without-capi \
            --without-dbus \
            --without-oss \
            --without-cups \
            --without-gphoto \
            --without-sane \
            --without-v4l2 \
            --without-udev \
            --without-pcap \
            --without-pcsclite

          make -j$(nproc)

          ccache -s

      # ------------------------------------------------------------
      # Package
      # ------------------------------------------------------------
      - name: 📦 Create install package
        run: |
          cd wine/build
          make install DESTDIR=/tmp/wine-install

          mkdir -p /tmp/wine-package
          cp -r /tmp/wine-install/* /tmp/wine-package/

          # Ensure nls files exist
          if [ ! -f /tmp/wine-package/usr/local/share/wine/nls/locale.nls ]; then
            mkdir -p /tmp/wine-package/usr/local/share/wine/nls
            cp ../nls/*.nls /tmp/wine-package/usr/local/share/wine/nls/ 2>/dev/null || true
          fi

          cd /tmp/wine-package
          tar -czf $GITHUB_WORKSPACE/wine-arm64-${WINE_BRANCH:-wine}.tar.gz .

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64-native
          path: wine-arm64-*.tar.gz

      # ------------------------------------------------------------
      # Create GitHub Release (on dispatch only)
      # ------------------------------------------------------------
      - name: 📤 Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: wine-arm64-${{ github.run_number }}
          name: Wine ARM64 Build ${{ github.run_number }}
          body: |
            **Wine ARM64 Native Build**
            - Runner: `ubuntu-22.04-arm`
            - Branch: ${{ github.event.inputs.wine_branch || 'wine' }}
            - Version: ${{ github.event.inputs.wine_version || 'latest' }}
            - LLVM MinGW: ${{ env.LLVMMINGW_NAME }}
            - Patches: Full Termux tmp, ARM64EC loader, VRAM spoof, FEX flags, GStreamer 1.20 fix, external 1.patch/2.patch

            Built on ${{ github.event.repository.updated_at }}.
          files: wine-arm64-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
