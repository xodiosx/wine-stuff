name: Build Wine ARM64EC (Proot Style)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ROOTFS: ${{ github.workspace }}/arm64-rootfs
      TMP_FIX: /data/data/com.termux/files/usr/tmp

    steps:
      - name: 📥 Install host tools
        run: |
          sudo apt update
          sudo apt install -y \
            qemu-user-static binfmt-support debootstrap \
            git wget build-essential

      - name: 🏗️ Create ARM64 rootfs (Ubuntu Jammy)
        run: |
          sudo debootstrap --arch=arm64 --foreign jammy $ROOTFS http://ports.ubuntu.com/ubuntu-ports

          sudo cp /usr/bin/qemu-aarch64-static $ROOTFS/usr/bin/

          sudo chroot $ROOTFS /debootstrap/debootstrap --second-stage

      - name: ⚙️ Setup ARM64 environment
        run: |
          sudo chroot $ROOTFS bash -c "
          apt update &&
          apt install -y \
            git build-essential \
            clang llvm flex bison \
            mingw-w64 \
            libx11-dev libfreetype6-dev libxcursor-dev \
            libxi-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libgl1-mesa-dev libosmesa6-dev \
            libpulse-dev libdbus-1-dev libfontconfig1-dev \
            libxcomposite-dev libxrender-dev libxext-dev \
            libudev-dev libvulkan-dev wget
          "

      - name: 📥 Clone Wine inside ARM64
        run: |
          sudo chroot $ROOTFS bash -c "
          cd /root &&
          git clone https://github.com/wine-mirror/wine.git &&
          cd wine &&
          git submodule update --init --recursive
          "

      - name: 🧪 Apply patches
        run: |
          sudo chroot $ROOTFS bash -c '
          cd /root/wine

          echo "🔧 Fixing /tmp paths..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i "s|/tmp/|'"$TMP_FIX"'/|g" || true
          find . -name "*.c" -exec sed -i "s|\"/tmp\"|\"'"$TMP_FIX"'\"|g" {} + || true

          sed -i "s/LONG dummy/long dummy/g" dlls/atiadlxx/atiadlxx_main.c 2>/dev/null || true
          sed -i "s|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g" dlls/atiadlxx/atiadlxx_main.c 2>/dev/null || true

          sed -i "/CDynamicArray/d" dlls/wdscore/wdscore.spec 2>/dev/null || true
          sed -i "s/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g" dlls/ntdll/unix/virtual.c 2>/dev/null || true

          sed -i "s|/x86_64-windows|/aarch64-windows|g" dlls/ntdll/unix/loader.c 2>/dev/null || true
          sed -i "s|xtajit64\.dll|libarm64ecfex.dll|g" dlls/ntdll/loader.c 2>/dev/null || true
          sed -i "s/ULONG buffer\[16\];/ULONG buffer\[32\];/g" dlls/ntdll/loader.c 2>/dev/null || true

          sed -i "s/xtajit64\.dll/libarm64ecfex.dll/g" loader/wine.inf.in 2>/dev/null || true
          sed -i "s/xtajit\.dll/libwow64fex.dll/g" loader/wine.inf.in 2>/dev/null || true

          sed -i "/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE (CONTEXT_ARM64 | 0x00000020)" include/winnt.h 2>/dev/null || true
          sed -i "/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE (CONTEXT_ARM64 | 0x00000040)" include/winnt.h 2>/dev/null || true

          sed -i "/memory_properties);/a \
          { \
              const char *v = getenv(\"WINE_VRAM_SIZE\"); \
              uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
              uint32_t k; \
              for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                  if (object->memory_properties.memoryHeaps[k].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                      object->memory_properties.memoryHeaps[k].size = s; \
          }" dlls/winevulkan/vulkan.c 2>/dev/null || true
          '

      - name: 🔨 Build Wine inside ARM64
        run: |
          sudo chroot $ROOTFS bash -c "
          cd /root/wine &&
          mkdir build && cd build &&
          ../configure --enable-win64 &&
          make -j$(nproc)
          "

      - name: 📦 Package
        run: |
          sudo chroot $ROOTFS bash -c "
          cd /root/wine/build &&
          tar -czf /root/wine-arm64.tar.gz *
          "

          sudo cp $ROOTFS/root/wine-arm64.tar.gz .

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64-proot
          path: wine-arm64.tar.gz
